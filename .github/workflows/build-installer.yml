name: "Build PT Indexim Coalindo Installer"

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  APP_VERSION: "2026.1"
  CONFIGURATION: Release

jobs:
  build-installer:
    name: "Build Windows Setup.exe"
    runs-on: windows-2022

    defaults:
      run:
        shell: cmd

    steps:
      - name: "Checkout source"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup MSVC"
        uses: seanmiddleditch/gha-setup-vsdevenv@v4
        with:
          host_arch: x86
          arch: win32

      - name: "Cache wxWidgets"
        id: cache-wx
        uses: actions/cache@v4
        with:
          path: cache\wxWidgets
          key: wx-3.2.9-vc14x-win32

      - name: "Download wxWidgets"
        if: steps.cache-wx.outputs.cache-hit != 'true'
        run: |
          if not exist cache mkdir cache
          if not exist cache\wxWidgets mkdir cache\wxWidgets
          curl -L -o wx_dev.7z "https://github.com/wxWidgets/wxWidgets/releases/download/v3.2.9/wxMSW-3.2.9_vc14x_Dev.7z"
          curl -L -o wx_hdr.7z "https://github.com/wxWidgets/wxWidgets/releases/download/v3.2.9/wxWidgets-3.2.9-headers.7z"
          curl -L -o wx_dll.7z "https://github.com/wxWidgets/wxWidgets/releases/download/v3.2.9/wxMSW-3.2.9_vc14x_ReleaseDLL.7z"
          7z x -y -ocache\wxWidgets wx_dev.7z
          7z x -y -ocache\wxWidgets wx_hdr.7z
          7z x -y -ocache\wxWidgets wx_dll.7z

      - name: "Cache Windows deps"
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: cache\buildwin
          key: buildwin-v0.5

      - name: "Download Windows deps"
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          if not exist cache\buildwin mkdir cache\buildwin
          curl -L -o deps.zip "https://github.com/OpenCPN/OCPNWindowsCoreBuildSupport/archive/refs/tags/v0.5.zip"
          7z x -y deps.zip -ocache\buildwin_tmp
          xcopy /s /y /q cache\buildwin_tmp\OCPNWindowsCoreBuildSupport-0.5\buildwin cache\buildwin\

      - name: "Fix patch line endings"
        shell: bash
        run: |
          find libs/libdnet -name "*.patch" | xargs -r sed -i 's/\r//'

      - name: "CMake Configure"
        run: |
          if exist build rmdir /s /q build
          mkdir build
          cd build
          cmake -A Win32 -G "Visual Studio 17 2022" ^
            -DwxWidgets_ROOT_DIR="%CD%\..\cache\wxWidgets" ^
            -DwxWidgets_LIB_DIR="%CD%\..\cache\wxWidgets\lib\vc14x_dll" ^
            -DwxWidgets_CONFIGURATION=mswu ^
            -DOCPN_TARGET_TUPLE="msvc-wx32;10;x86_64" ^
            -DOCPN_CI_BUILD=ON ^
            -DOCPN_BUNDLE_WXDLLS=ON ^
            -DOCPN_BUILD_TEST=OFF ^
            -DCMAKE_BUILD_TYPE=Release ^
            ..
          if errorlevel 1 exit /b 1

      - name: "Build"
        run: |
          cd build
          cmake --build . --config Release --parallel %NUMBER_OF_PROCESSORS% -- /nologo /verbosity:minimal
          if errorlevel 1 exit /b 1

      - name: "Create Installer (CPack/NSIS)"
        run: |
          cd build
          cmake --build . --config Release --target package
          if errorlevel 1 exit /b 1

      - name: "Collect installer"
        shell: bash
        run: |
          mkdir -p output
          find build -name "*setup*.exe" -not -path "*/Release/aisnesia.exe" | head -1 | \
            xargs -I{} cp {} "output/PTIndeximCoalindo_2026.1_setup.exe"
          ls -lh output/

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "PTIndeximCoalindo-2026.1-Setup"
          path: "output/PTIndeximCoalindo_2026.1_setup.exe"
          retention-days: 30
          if-no-files-found: error

      - name: "Create Release"
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v2026.1"
          name: "PT Indexim Coalindo v2026.1"
          body: |
            ## PT Indexim Coalindo v2026.1

            ### Download
            Unduh **PTIndeximCoalindo_2026.1_setup.exe** di bawah.

            ### Cara Install
            1. Download file setup.exe
            2. Jalankan sebagai Administrator
            3. Masukkan Serial Number saat diminta
            4. Ikuti wizard instalasi
          files: "output/PTIndeximCoalindo_2026.1_setup.exe"
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: false
